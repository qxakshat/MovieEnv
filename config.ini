# Movie Recommendation OpenEnv - Configuration

# Environment Configuration
[environment]
max_recommendations = 6
reward_scale = 1.0
genre_match_weight = 0.5
quality_weight = 0.3
novelty_weight = 0.2

# Model Configuration
[model]
model_id = HuggingFaceTB/SmolLM2-135M-Instruct
tokenizer_id = HuggingFaceTB/SmolLM2-135M-Instruct
device = auto
dtype = auto

# Training Configuration
[training]
learning_rate = 5e-6
weight_decay = 0.0
gradient_accumulation_steps = 64
per_device_batch_size = 1
num_epochs = 3
num_generations = 2
max_new_tokens = 32
warmup_steps = 20

# Sampling Configuration
[sampling]
temperature = 0.8
top_k = 10
top_p = 0.9
do_sample = true

# Logging Configuration
[logging]
logging_steps = 10
save_steps = 50
save_strategy = steps
report_to = tensorboard

# Dataset Configuration
[dataset]
max_users = 1000
dataset_prompt = "Recommend movies the user will enjoy."
seed = 42

# Output Configuration
[output]
output_dir = outputs/
checkpoint_dir = checkpoints/
results_dir = results/
create_timestamp_dir = true
